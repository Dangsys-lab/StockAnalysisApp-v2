<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术分析报告 - 股票分析工具 v2.0</title>
    <link rel="stylesheet" href="/static/css/main_v2.css">
    <style>
        .report-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .report-header {
            background: linear-gradient(135deg, #1e293b, #334155);
            color: white;
            padding: 32px;
            border-radius: 16px;
            margin-bottom: 24px;
        }
        
        .report-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .report-subtitle {
            opacity: 0.8;
            font-size: 14px;
        }
        
        .score-section {
            background: white;
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
            text-align: center;
        }
        
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 800;
            margin: 0 auto 20px;
            transition: all 0.3s;
        }
        
        .score-high { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .score-mid { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .score-low { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
        
        .signals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 24px;
        }
        
        .signal-card {
            background: var(--bg-primary);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid;
        }
        
        .signal-bullish { border-color: #10b981; }
        .signal-bearish { border-color: #ef4444; }
        
        .summary-box {
            background: #f8fafc;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .summary-text {
            font-size: 18px;
            line-height: 1.8;
            color: var(--text-primary);
        }
        
        .disclaimer-banner {
            background: #fef3c7;
            border: 2px solid #f59e0b;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-top: 24px;
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="report-container">
        <a href="/" class="back-link">← 返回首页</a>

        <div class="report-header" id="reportHeader">
            <h1 class="report-title">📊 技术面总结报告</h1>
            <p class="report-subtitle">股票代码: {{ stock_code }} | 生成时间: --</p>
        </div>

        <!-- 综合评分 -->
        <div class="score-section" id="scoreSection">
            <h2>综合技术状态评分</h2>
            <div class="score-circle score-mid" id="scoreCircle">--</div>
            <p id="scoreDescription">加载中...</p>
        </div>

        <!-- 技术面总结 -->
        <div class="summary-box" id="summaryBox">
            <h3>📋 技术面总结</h3>
            <div class="summary-text" id="summaryText">
                正在生成报告...
            </div>
        </div>

        <!-- 信号详情 -->
        <div class="signals-grid" id="signalsGrid">
            <!-- 动态填充 -->
        </div>

        <!-- 免责声明 -->
        <div class="disclaimer-banner">
            <strong>⚠️ 重要声明（请仔细阅读）</strong><br><br>
            本报告仅提供技术指标的<strong>客观数值计算与状态描述</strong>。<br>
            所有输出均为纯技术数据呈现，<strong>不构成任何投资建议、操作指引或收益承诺</strong>。<br>
            投资有风险，入市需谨慎。用户需自主做出投资决策。
        </div>
    </div>

    <script>
        const stockCode = '{{ stock_code }}';
        
        document.addEventListener('DOMContentLoaded', function() {
            loadReport(stockCode);
        });
        
        async function loadReport(code) {
            try {
                const response = await fetch(`/api/report/${code}?is_pro=true`);
                const data = await response.json();
                
                if (data.success) {
                    renderReport(data);
                } else {
                    showError(data.message || '报告生成失败');
                }
            } catch (error) {
                console.error('加载报告失败:', error);
                showError('网络错误，请刷新重试');
            }
        }
        
        function renderReport(report) {
            // 更新头部
            document.querySelector('.report-subtitle').textContent = 
                `股票代码: ${report.stock_code} | 生成时间: ${report.generated_at}`;
            
            // 更新评分
            const score = report.score || 50;
            const scoreCircle = document.getElementById('scoreCircle');
            scoreCircle.textContent = score;
            
            if (score >= 60) {
                scoreCircle.className = 'score-circle score-high';
                document.getElementById('scoreDescription').textContent = 
                    '当前多头信号相对较多（基于指标客观计算）';
            } else if (score <= 40) {
                scoreCircle.className = 'score-circle score-low';
                document.getElementById('scoreDescription').textContent = 
                    '当前空头信号相对较多（基于指标客观计算）';
            } else {
                scoreCircle.className = 'score-circle score-mid';
                document.getElementById('scoreDescription').textContent = 
                    '当前多空信号较为均衡（基于指标客观计算）';
            }
            
            // 更新总结
            const summary = report.summary || {};
            document.getElementById('summaryText').innerHTML = `
                <p>${summary.pattern_description || '数据加载中...'}</p>
                <p style="margin-top: 12px;">
                    <strong>信号统计:</strong> 多头 ${summary.signal_counts?.bullish || 0} 个 vs 
                    空头 ${summary.signal_counts?.bearish || 0} 个
                </p>
                <p style="margin-top: 8px; color: #64748b;">
                    市场环境: ${summary.market_context || '--'}
                </p>
            `;
            
            // 更新信号列表
            const signalsGrid = document.getElementById('signalsGrid');
            let signalsHtml = '';
            
            if (summary.top_bullish_signals?.length > 0) {
                signalsHtml += '<div class="signal-card signal-bullish"><h4>✅ 主要多头信号</h4>';
                summary.top_bullish_signals.forEach((sig, i) => {
                    signalsHtml += `<p style="margin: 8px 0;">${i + 1}. ${sig}</p>`;
                });
                signalsHtml += '</div>';
            }
            
            if (summary.top_bearish_signals?.length > 0) {
                signalsHtml += '<div class="signal-card signal-bearish"><h4>⚠️ 主要空头信号</h4>';
                summary.top_bearish_signals.forEach((sig, i) => {
                    signalsHtml += `<p style="margin: 8px 0;">${i + 1}. ${sig}</p>`;
                });
                signalsHtml += '</div>';
            }
            
            if (!signalsHtml) {
                signalsHtml = '<p style="text-align: center; color: #64748b;">暂无明显信号</p>';
            }
            
            signalsGrid.innerHTML = signalsHtml;
        }
        
        function showError(message) {
            document.getElementById('summaryText').innerHTML = `<p style="color: #ef4444;">❌ ${message}</p>`;
            document.getElementById('scoreCircle').textContent = '--';
        }
    </script>
</body>
</html>
