name: Submit for Review

on:
  workflow_dispatch:

jobs:
  submit:
    runs-on: macos-15
    steps:
    - name: Submit to App Store Review
      env:
        API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "$API_KEY_BASE64" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8
        chmod 600 ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8

        pip3 install PyJWT==2.8.0 cryptography 2>/dev/null

        python3 << 'PYEOF'
        import json, time, sys, os, urllib.request, urllib.error
        from datetime import datetime, timezone
        import jwt

        KEY_ID = os.environ["API_KEY_ID"]
        ISSUER_ID = os.environ["ISSUER_ID"]
        KEY_PATH = os.path.expanduser(f"~/.appstoreconnect/private_keys/AuthKey_{KEY_ID}.p8")

        with open(KEY_PATH, "rb") as f:
            key = f.read()

        def make_token():
            now = int(datetime.now(timezone.utc).timestamp())
            payload = {"iss": ISSUER_ID, "iat": now, "exp": now + 1200, "aud": "appstoreconnect-v1"}
            return jwt.encode(payload, key, algorithm="ES256", headers={"kid": KEY_ID})

        def api(method, path, data=None):
            token = make_token()
            headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
            url = f"https://appstoreconnect.apple.com{path}"
            req = urllib.request.Request(url, headers=headers, method=method)
            if data:
                req.data = json.dumps(data).encode()
            try:
                with urllib.request.urlopen(req, timeout=30) as r:
                    return json.loads(r.read())
            except urllib.error.HTTPError as e:
                body = e.read().decode()
                print(f"API Error {e.code}: {body}")
                raise

        BUNDLE_ID = "com.dangsys.stockanalyzer"

        print("Step 1: Finding app...")
        apps = api("GET", f"/v1/apps?filter[bundleId]={BUNDLE_ID}")
        if not apps.get("data"):
            print(f"App not found for bundle ID: {BUNDLE_ID}")
            sys.exit(1)
        APP_ID = apps["data"][0]["id"]
        APP_NAME = apps["data"][0]["attributes"]["name"]
        print(f"App: {APP_NAME} (ID: {APP_ID})")

        print("Step 2: Finding latest valid build...")
        BUILD_ID = None
        builds = api("GET", f"/v1/builds?filter[app]={APP_ID}&sort=-uploadedDate&limit=5")
        for b in builds.get("data", []):
            state = b["attributes"].get("processingState", "UNKNOWN")
            print(f"  Build {b['id']}: {state}")
            if state == "VALID":
                BUILD_ID = b["id"]
                break

        if not BUILD_ID:
            print("No VALID build found. Waiting for processing...")
            for i in range(60):
                time.sleep(30)
                builds = api("GET", f"/v1/builds?filter[app]={APP_ID}&sort=-uploadedDate&limit=1")
                if builds.get("data"):
                    b = builds["data"][0]
                    state = b["attributes"].get("processingState", "UNKNOWN")
                    print(f"  [{i+1}/60] Build {b['id']}: {state}")
                    if state == "VALID":
                        BUILD_ID = b["id"]
                        break
                    elif state == "INVALID":
                        print("Build is INVALID!")
                        sys.exit(1)

        if not BUILD_ID:
            print("Build processing timeout (30 min).")
            sys.exit(1)
        print(f"Build ready: {BUILD_ID}")

        print("Step 3: Finding app store version...")
        versions = api("GET", f"/v1/appStoreVersions?filter[app]={APP_ID}")
        version_id = None
        for v in versions.get("data", []):
            state = v["attributes"].get("appStoreState", "")
            if state in ["PREPARE_FOR_SUBMISSION", "DEVELOPER_REJECTED", "REJECTED"]:
                version_id = v["id"]
                print(f"Found existing version: {v['attributes']['versionString']} (state: {state})")
                break

        if not version_id:
            build_ver = b["attributes"].get("versionString", "2.0.0")
            print(f"Creating new version: {build_ver}...")
            new_ver = api("POST", "/v1/appStoreVersions", {
                "data": {
                    "type": "appStoreVersions",
                    "attributes": {"platform": "IOS", "versionString": build_ver},
                    "relationships": {"app": {"data": {"type": "apps", "id": APP_ID}}}
                }
            })
            version_id = new_ver["data"]["id"]
            print(f"Created version: {build_ver}")

        print("Step 4: Assigning build to version...")
        api("PATCH", f"/v1/appStoreVersions/{version_id}", {
            "data": {
                "type": "appStoreVersions",
                "id": version_id,
                "relationships": {
                    "build": {"data": {"type": "builds", "id": BUILD_ID}}
                }
            }
        })
        print("Build assigned!")

        print("Step 5: Submitting for review...")
        try:
            api("POST", "/v1/appStoreVersionSubmissions", {
                "data": {
                    "type": "appStoreVersionSubmissions",
                    "relationships": {
                        "appStoreVersion": {"data": {"type": "appStoreVersions", "id": version_id}}
                    }
                }
            })
            print("SUCCESS! Submitted for review!")
            print(f"  App: {APP_NAME}")
            print(f"  App ID: {APP_ID}")
            print(f"  Build: {BUILD_ID}")
            print(f"  Version: {version_id}")
            print(f"  Track: https://appstoreconnect.apple.com/apps/{APP_ID}/distribution/ios/version/inflight")
        except Exception as e:
            print(f"Submission failed: {e}")
            print("Common reasons:")
            print("  - Missing screenshots")
            print("  - Missing app description or keywords")
            print("  - Missing privacy policy URL")
            print("  - Missing age rating")
            print(f"  Fix at: https://appstoreconnect.apple.com/apps/{APP_ID}")
            sys.exit(1)
        PYEOF
