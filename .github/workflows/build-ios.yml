name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode 16.4
      run: sudo xcode-select -s /Applications/Xcode_16.4.app

    - name: Install iOS Simulator Runtime
      run: |
        if ! xcrun simctl list runtimes | grep -q "iOS"; then
          echo "No iOS runtime found, downloading..."
          xcodebuild -downloadPlatform iOS
        fi
        xcrun simctl list runtimes | grep iOS || true

    - name: Create Simulator
      run: |
        RUNTIME=$(xcrun simctl list runtimes | grep "iOS" | head -1 | sed 's/.*- \(com\.apple\.CoreSimulator\.SimRuntime\.[^ ]*\).*/\1/')
        if [ -z "$RUNTIME" ]; then
          echo "No iOS runtime available, skipping simulator creation"
          exit 0
        fi
        echo "Using runtime: $RUNTIME"
        
        # Create iPhone simulator
        DEVICETYPE=$(xcrun simctl list devicetypes | grep "iPhone 16" | head -1 | sed 's/.*- \(com\.apple\.CoreSimulator\.SimDeviceType\.[^ ]*\).*/\1/')
        if [ -z "$DEVICETYPE" ]; then
          echo "iPhone 16 device type not found, listing available..."
          xcrun simctl list devicetypes | grep iPhone | head -5
          DEVICETYPE=$(xcrun simctl list devicetypes | grep "iPhone" | head -1 | sed 's/.*- \(com\.apple\.CoreSimulator\.SimDeviceType\.[^ ]*\).*/\1/')
        fi
        echo "Using iPhone device type: $DEVICETYPE"
        xcrun simctl create "iPhone 16" "$DEVICETYPE" "$RUNTIME" || true
        
        # Create iPad simulator (13-inch)
        IPAD_DEVICETYPE=$(xcrun simctl list devicetypes | grep "iPad Air 13-inch" | head -1 | sed 's/.*- \(com\.apple\.CoreSimulator\.SimDeviceType\.[^ ]*\).*/\1/')
        if [ -z "$IPAD_DEVICETYPE" ]; then
          echo "iPad Air 13-inch not found, trying iPad Pro 13-inch..."
          IPAD_DEVICETYPE=$(xcrun simctl list devicetypes | grep "iPad Pro 13-inch" | head -1 | sed 's/.*- \(com\.apple\.CoreSimulator\.SimDeviceType\.[^ ]*\).*/\1/')
        fi
        if [ -z "$IPAD_DEVICETYPE" ]; then
          echo "iPad Pro 13-inch not found, trying any iPad..."
          IPAD_DEVICETYPE=$(xcrun simctl list devicetypes | grep "iPad" | head -1 | sed 's/.*- \(com\.apple\.CoreSimulator\.SimDeviceType\.[^ ]*\).*/\1/')
        fi
        
        if [ -n "$IPAD_DEVICETYPE" ]; then
          echo "Using iPad device type: $IPAD_DEVICETYPE"
          xcrun simctl create "iPad 13-inch" "$IPAD_DEVICETYPE" "$RUNTIME" || true
        fi
        
        xcrun simctl list devices available | grep -E "iPhone|iPad"

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      working-directory: ios
      run: xcodegen generate

    - name: Build for Simulator
      working-directory: ios
      run: |
        DESTINATION='generic/platform=iOS Simulator'
        if xcrun simctl list devices available | grep -q "iPhone 16"; then
          DESTINATION='platform=iOS Simulator,name=iPhone 16'
        fi
        echo "Building with destination: $DESTINATION"
        xcodebuild \
          -project StockAnalysisApp.xcodeproj \
          -scheme StockAnalysisApp \
          -sdk iphonesimulator \
          -destination "$DESTINATION" \
          -configuration Debug \
          -derivedDataPath ./DerivedData \
          build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Take Screenshots
      run: |
        mkdir -p ./screenshots
        
        APP_PATH=$(find ios/DerivedData -name "StockAnalysisApp.app" -path "*/Debug-iphonesimulator/*" | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "❌ App not found in DerivedData"
          find ios/DerivedData -name "*.app" 2>/dev/null || true
          exit 1
        fi
        
        echo "📦 App path: $APP_PATH"
        
        # iPhone screenshots
        echo "📱 Taking iPhone screenshots..."
        IPHONE_SIMULATOR_ID=$(xcrun simctl list devices available | grep "iPhone 16 Pro Max" | head -1 | grep -o -E '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}')
        
        if [ -z "$IPHONE_SIMULATOR_ID" ]; then
          echo "⚠️ iPhone 16 Pro Max not found, trying iPhone 16 Plus..."
          IPHONE_SIMULATOR_ID=$(xcrun simctl list devices available | grep "iPhone 16 Plus" | head -1 | grep -o -E '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}')
        fi
        
        if [ -z "$IPHONE_SIMULATOR_ID" ]; then
          echo "⚠️ iPhone 16 Plus not found, trying iPhone 16..."
          IPHONE_SIMULATOR_ID=$(xcrun simctl list devices available | grep "iPhone 16" | grep -v "Pro" | grep -v "Plus" | head -1 | grep -o -E '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}')
        fi
        
        if [ -n "$IPHONE_SIMULATOR_ID" ]; then
          echo "📱 Using iPhone simulator: $IPHONE_SIMULATOR_ID"
          
          xcrun simctl boot "$IPHONE_SIMULATOR_ID" 2>/dev/null || true
          sleep 15
          
          xcrun simctl install "$IPHONE_SIMULATOR_ID" "$APP_PATH"
          
          xcrun simctl launch "$IPHONE_SIMULATOR_ID" com.dangsys.stockanalyzer
          sleep 8
          xcrun simctl io "$IPHONE_SIMULATOR_ID" screenshot ./screenshots/iphone_01_home.png
          echo "📸 Screenshot: iPhone Home tab"
          
          xcrun simctl terminate "$IPHONE_SIMULATOR_ID" com.dangsys.stockanalyzer 2>/dev/null || true
          sleep 2
          xcrun simctl launch "$IPHONE_SIMULATOR_ID" com.dangsys.stockanalyzer --tab-market
          sleep 5
          xcrun simctl io "$IPHONE_SIMULATOR_ID" screenshot ./screenshots/iphone_02_market.png
          echo "📸 Screenshot: iPhone Market tab"
          
          xcrun simctl terminate "$IPHONE_SIMULATOR_ID" com.dangsys.stockanalyzer 2>/dev/null || true
          sleep 2
          xcrun simctl launch "$IPHONE_SIMULATOR_ID" com.dangsys.stockanalyzer --tab-portfolio
          sleep 5
          xcrun simctl io "$IPHONE_SIMULATOR_ID" screenshot ./screenshots/iphone_03_portfolio.png
          echo "📸 Screenshot: iPhone Portfolio tab"
          
          xcrun simctl terminate "$IPHONE_SIMULATOR_ID" com.dangsys.stockanalyzer 2>/dev/null || true
          sleep 2
          xcrun simctl launch "$IPHONE_SIMULATOR_ID" com.dangsys.stockanalyzer --tab-settings
          sleep 5
          xcrun simctl io "$IPHONE_SIMULATOR_ID" screenshot ./screenshots/iphone_04_settings.png
          echo "📸 Screenshot: iPhone Settings tab"
          
          xcrun simctl shutdown "$IPHONE_SIMULATOR_ID" 2>/dev/null || true
        else
          echo "❌ No suitable iPhone simulator found"
        fi
        
        # iPad screenshots
        echo "📱 Taking iPad screenshots..."
        IPAD_SIMULATOR_ID=$(xcrun simctl list devices available | grep "iPad 13-inch" | head -1 | grep -o -E '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}' || true)
        
        if [ -z "$IPAD_SIMULATOR_ID" ]; then
          echo "⚠️ iPad 13-inch not found, trying any iPad..."
          IPAD_SIMULATOR_ID=$(xcrun simctl list devices available | grep "iPad" | head -1 | grep -o -E '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}' || true)
        fi
        
        if [ -n "$IPAD_SIMULATOR_ID" ]; then
          echo "📱 Using iPad simulator: $IPAD_SIMULATOR_ID"
          
          xcrun simctl boot "$IPAD_SIMULATOR_ID" 2>/dev/null || true
          sleep 15
          
          xcrun simctl install "$IPAD_SIMULATOR_ID" "$APP_PATH" || true
          
          xcrun simctl launch "$IPAD_SIMULATOR_ID" com.dangsys.stockanalyzer || true
          sleep 8
          xcrun simctl io "$IPAD_SIMULATOR_ID" screenshot ./screenshots/ipad_01_home.png || echo "⚠️ Failed to take iPad home screenshot"
          echo "📸 Screenshot: iPad Home tab"
          
          xcrun simctl terminate "$IPAD_SIMULATOR_ID" com.dangsys.stockanalyzer 2>/dev/null || true
          sleep 2
          xcrun simctl launch "$IPAD_SIMULATOR_ID" com.dangsys.stockanalyzer --tab-market || true
          sleep 5
          xcrun simctl io "$IPAD_SIMULATOR_ID" screenshot ./screenshots/ipad_02_market.png || echo "⚠️ Failed to take iPad market screenshot"
          echo "📸 Screenshot: iPad Market tab"
          
          xcrun simctl terminate "$IPAD_SIMULATOR_ID" com.dangsys.stockanalyzer 2>/dev/null || true
          sleep 2
          xcrun simctl launch "$IPAD_SIMULATOR_ID" com.dangsys.stockanalyzer --tab-portfolio || true
          sleep 5
          xcrun simctl io "$IPAD_SIMULATOR_ID" screenshot ./screenshots/ipad_03_portfolio.png || echo "⚠️ Failed to take iPad portfolio screenshot"
          echo "📸 Screenshot: iPad Portfolio tab"
          
          xcrun simctl terminate "$IPAD_SIMULATOR_ID" com.dangsys.stockanalyzer 2>/dev/null || true
          sleep 2
          xcrun simctl launch "$IPAD_SIMULATOR_ID" com.dangsys.stockanalyzer --tab-settings || true
          sleep 5
          xcrun simctl io "$IPAD_SIMULATOR_ID" screenshot ./screenshots/ipad_04_settings.png || echo "⚠️ Failed to take iPad settings screenshot"
          echo "📸 Screenshot: iPad Settings tab"
          
          xcrun simctl shutdown "$IPAD_SIMULATOR_ID" 2>/dev/null || true
        else
          echo "⚠️ No suitable iPad simulator found, skipping iPad screenshots"
        fi
        
        echo "✅ Screenshots saved to ./screenshots/"
        ls -la ./screenshots/

    - name: Take IAP Screenshots
      run: |
        mkdir -p ./iap_screenshots
        
        APP_PATH=$(find ios/DerivedData -name "StockAnalysisApp.app" -path "*/Debug-iphonesimulator/*" | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "❌ App not found in DerivedData"
          exit 1
        fi
        
        echo "📦 App path: $APP_PATH"
        
        # Use iPhone for IAP screenshots
        IPHONE_SIMULATOR_ID=$(xcrun simctl list devices available | grep "iPhone 16 Pro Max" | head -1 | grep -o -E '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}' || true)
        
        if [ -z "$IPHONE_SIMULATOR_ID" ]; then
          IPHONE_SIMULATOR_ID=$(xcrun simctl list devices available | grep "iPhone 16 Plus" | head -1 | grep -o -E '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}' || true)
        fi
        
        if [ -z "$IPHONE_SIMULATOR_ID" ]; then
          IPHONE_SIMULATOR_ID=$(xcrun simctl list devices available | grep "iPhone 16" | grep -v "Pro" | grep -v "Plus" | head -1 | grep -o -E '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12]' || true)
        fi
        
        if [ -n "$IPHONE_SIMULATOR_ID" ]; then
          echo "📱 Using iPhone simulator for IAP screenshots: $IPHONE_SIMULATOR_ID"
          
          xcrun simctl boot "$IPHONE_SIMULATOR_ID" 2>/dev/null || true
          sleep 15
          
          xcrun simctl install "$IPHONE_SIMULATOR_ID" "$APP_PATH"
          
          # Screenshot 1: Home page with upgrade button
          xcrun simctl launch "$IPHONE_SIMULATOR_ID" com.dangsys.stockanalyzer
          sleep 8
          xcrun simctl io "$IPHONE_SIMULATOR_ID" screenshot ./iap_screenshots/iap_01_home_upgrade.png
          echo "📸 IAP Screenshot: Home with upgrade button"
          
          # Screenshot 2: Settings page with upgrade option
          xcrun simctl terminate "$IPHONE_SIMULATOR_ID" com.dangsys.stockanalyzer 2>/dev/null || true
          sleep 2
          xcrun simctl launch "$IPHONE_SIMULATOR_ID" com.dangsys.stockanalyzer --tab-settings
          sleep 5
          xcrun simctl io "$IPHONE_SIMULATOR_ID" screenshot ./iap_screenshots/iap_02_settings_upgrade.png
          echo "📸 IAP Screenshot: Settings with upgrade option"
          
          # Screenshot 3: Upgrade prompt card (home page)
          xcrun simctl terminate "$IPHONE_SIMULATOR_ID" com.dangsys.stockanalyzer 2>/dev/null || true
          sleep 2
          xcrun simctl launch "$IPHONE_SIMULATOR_ID" com.dangsys.stockanalyzer
          sleep 8
          # Scroll to show upgrade card
          xcrun simctl io "$IPHONE_SIMULATOR_ID" screenshot ./iap_screenshots/iap_03_upgrade_card.png
          echo "📸 IAP Screenshot: Upgrade card"
          
          xcrun simctl shutdown "$IPHONE_SIMULATOR_ID" 2>/dev/null || true
        else
          echo "❌ No suitable iPhone simulator found for IAP screenshots"
        fi
        
        echo "✅ IAP Screenshots saved to ./iap_screenshots/"
        ls -la ./iap_screenshots/

    - name: Upload IAP Screenshots
      uses: actions/upload-artifact@v4
      with:
        name: IAP-Screenshots
        path: iap_screenshots/*.png
        retention-days: 30

    - name: Upload Screenshots
      uses: actions/upload-artifact@v4
      with:
        name: App-Screenshots
        path: screenshots/*.png
        retention-days: 30

    - name: Import Certificate
      env:
        P12_BASE64: ${{ secrets.P12_BASE64 }}
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      run: |
        mkdir -p ~/certs
        
        # Check if P12_BASE64 is set
        if [ -z "$P12_BASE64" ]; then
          echo "❌ P12_BASE64 secret is not set"
          exit 1
        fi
        
        # Decode base64 and check if successful
        echo "$P12_BASE64" | base64 -d > ~/certs/cert.p12
        
        if [ ! -f ~/certs/cert.p12 ]; then
          echo "❌ Failed to create cert.p12 file"
          exit 1
        fi
        
        # Check file size
        FILE_SIZE=$(stat -f%z ~/certs/cert.p12)
        if [ "$FILE_SIZE" -eq 0 ]; then
          echo "❌ cert.p12 file is empty"
          exit 1
        fi
        
        echo "✅ cert.p12 created successfully (size: $FILE_SIZE bytes)"
        
        # Create keychain and import certificate
        security create-keychain -p actions ~/certs/keychain.db
        security import ~/certs/cert.p12 -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k ~/certs/keychain.db
        security list-keychains -s ~/certs/keychain.db
        security set-key-partition-list -S apple-tool:,apple: -k actions ~/certs/keychain.db
        
        echo "✅ Certificate imported successfully"

    - name: Install Provisioning Profile
      env:
        PROVISION_BASE64: ${{ secrets.PROVISION_BASE64 }}
      run: |
        mkdir -p ~/profiles
        echo "$PROVISION_BASE64" | base64 -d > ~/profiles/profile.mobileprovision
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        UUID=$(security cms -D -i ~/profiles/profile.mobileprovision 2>/dev/null | plutil -extract UUID raw -)
        echo "Profile UUID: $UUID"
        cp ~/profiles/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

    - name: Archive for Distribution
      working-directory: ios
      run: |
        xcodebuild \
          -project StockAnalysisApp.xcodeproj \
          -scheme StockAnalysisApp \
          -sdk iphoneos \
          -configuration Release \
          -archivePath build/StockAnalysisApp.xcarchive \
          CODE_SIGN_IDENTITY="Apple Distribution" \
          CODE_SIGNING_REQUIRED=YES \
          CODE_SIGNING_ALLOWED=YES \
          CODE_SIGN_STYLE=Manual \
          DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
          PROVISIONING_PROFILE_SPECIFIER="StockAnalyzer_Dist" \
          -allowProvisioningUpdates \
          archive

    - name: Export IPA
      working-directory: ios
      run: |
        xcodebuild \
          -exportArchive \
          -archivePath build/StockAnalysisApp.xcarchive \
          -exportOptionsPlist StockAnalysisApp/ExportOptions.plist \
          -exportPath build/ipa \
          -allowProvisioningUpdates

    - name: Upload IPA to App Store Connect
      if: success()
      env:
        API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "$API_KEY_BASE64" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8
        chmod 600 ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8

        IPA_PATH=$(find ios/build/ipa -name "*.ipa" | head -1)
        if [ -z "$IPA_PATH" ]; then
          echo "❌ No IPA file found!"
          exit 1
        fi
        echo "📦 Uploading: $IPA_PATH"
        ls -la "$IPA_PATH"

        xcrun altool --upload-app \
          --type ios \
          --file "$IPA_PATH" \
          --apiKey "$API_KEY_ID" \
          --apiIssuer "$ISSUER_ID"

        echo "✅ Upload complete!"

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: StockAnalysisApp.ipa
        path: ios/build/ipa/*.ipa
        retention-days: 30

    - name: Cleanup
      if: always()
      run: |
        security delete-keychain ~/certs/keychain.db 2>/dev/null || true
        rm -rf ~/certs ~/profiles
